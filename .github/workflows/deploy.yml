name: Deploy

# Under the tag-on-commit scheme, scaffold is the sole authority for
# handfish releases. This workflow just fires the workflow_dispatch at
# scaffold, which clones handfish, computes next patch from existing
# tags, builds, deploys library bundles and the site page to the CDN
# origin, atomically updates the rolling MAJOR.MINOR symlink, creates
# the vMAJOR.MINOR.PATCH git tag on this repo, and purges the CDN.
#
# See the policy document in scaffold for the full contract.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trigger-scaffold-release:
    name: Dispatch scaffold library-release
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Mint scaffold GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 2959521
          private-key: ${{ secrets.EHSRE_APP_PRIVATE_KEY }}
          owner: noisefactorllc
          repositories: scaffold

      - name: Dispatch scaffold library-release for handfish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run library-release.yml \
            --repo noisefactorllc/scaffold \
            --ref main \
            -f library=handfish \
            -f sha=${{ github.sha }}
          echo "Dispatched scaffold library-release for handfish @ ${{ github.sha }}"
